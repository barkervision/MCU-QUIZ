<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MCU Quiz Challenge</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Impact:wght@400;700&family=Roboto:wght@400;700&display=swap');

    body {
      font-family: 'Roboto', sans-serif;
      margin: 0;
      padding: 20px 10px;
      min-height: 100vh;
      background: linear-gradient(rgba(0,0,0,0.65), rgba(0,0,0,0.75)), 
                  url('https://picsum.photos/id/1015/1920/1080') center/cover no-repeat fixed;
      color: #fff;
      text-align: center;
    }

    .container {
      max-width: 740px;
      margin: 0 auto;
      background: rgba(0, 0, 0, 0.45);
      border-radius: 20px;
      padding: 35px 25px;
      box-shadow: 0 0 40px rgba(230, 36, 41, 0.6);
      border: 2px solid rgba(230, 36, 41, 0.3);
    }

    h1 {
      font-family: 'Impact', sans-serif;
      color: #e62429;
      font-size: 3.4em;
      margin: 10px 0 8px;
      text-shadow: 0 0 20px #e62429, 0 0 30px #e62429;
      letter-spacing: 3px;
    }

    p {
      font-size: 1.25em;
      color: #ddd;
      margin-bottom: 20px;
    }

    #music-btn {
      background: #00bfff;
      color: white;
      border: none;
      padding: 14px 32px;
      font-size: 1.3em;
      border-radius: 50px;
      margin: 20px auto;
      display: block;
      cursor: pointer;
      box-shadow: 0 6px 20px rgba(0, 191, 255, 0.5);
    }

    .progress {
      font-size: 1.3em;
      color: #ccc;
      margin-bottom: 15px;
    }

    .question {
      font-size: 1.75em;
      margin: 40px 0 30px;
      min-height: 120px;
      line-height: 1.4;
      font-weight: 500;
      text-shadow: 0 2px 8px rgba(0,0,0,0.8);
    }

    button.answer-btn {
      background: #e62429;
      color: white;
      border: none;
      padding: 20px 35px;
      margin: 12px auto;
      font-size: 1.25em;
      cursor: pointer;
      border-radius: 14px;
      min-width: 340px;
      display: block;
      transition: all 0.3s;
      box-shadow: 0 6px 15px rgba(230, 36, 41, 0.4);
    }

    button.answer-btn:hover {
      background: #ff2d33;
      transform: translateY(-4px) scale(1.05);
    }

    button.answer-btn:disabled {
      background: #555;
      transform: none;
    }

    .correct {
      background: #00cc00 !important;
      box-shadow: 0 0 20px #00ff88;
    }

    #result {
      font-size: 1.85em;
      margin: 50px 0;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>MCU QUIZ CHALLENGE</h1>
    <p>Test your knowledge of the Marvel Cinematic Universe</p>
    
    <button id="music-btn" onclick="toggleMusic()">🎵 Play Epic Music</button>
    
    <audio id="bgmusic" loop>
      <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-3.mp3" type="audio/mpeg">
    </audio>

    <div id="quiz">
      <div class="progress">Question <span id="q-num">1</span>/3</div>
      <div class="question" id="question-text"></div>
      <div id="options"></div>
    </div>
    
    <div id="result" style="display:none;"></div>
    <button id="next-btn" style="display:none; margin-top:30px; padding:18px 45px; font-size:1.35em;" onclick="nextQuestion()">Next Question</button>
  </div>

  <script>
    const questionsDB = [
      { q: "What is the name of Thor's hammer?", a: ["Mjolnir", "Stormbreaker", "Gungnir", "Axe of the All-Father"], correct: 0 },
      { q: "Who is the Winter Soldier?", a: ["Bucky Barnes", "Steve Rogers", "Sam Wilson", "Clint Barton"], correct: 0 },
      { q: "In what year was the first Iron Man movie released?", a: ["2008", "2010", "2012", "2005"], correct: 0 },
      { q: "What is Captain America's shield made of?", a: ["Vibranium", "Adamantium", "Uru", "Titanium"], correct: 0 },
      { q: "Who said the line 'I am Groot'?", a: ["Groot", "Rocket Raccoon", "Drax", "Yondu"], correct: 0 },
      { q: "What is Black Widow's real name?", a: ["Natasha Romanoff", "Wanda Maximoff", "Maria Hill", "Yelena Belova"], correct: 0 },
      { q: "Which Infinity Stone was housed in the Tesseract?", a: ["Space Stone", "Mind Stone", "Power Stone", "Soul Stone"], correct: 0 },
      { q: "Who plays Spider-Man in the MCU?", a: ["Tom Holland", "Andrew Garfield", "Tobey Maguire", "Miles Morales (voice)"], correct: 0 },
      { q: "What planet is Thanos from?", a: ["Titan", "Xandar", "Morag", "Vormir"], correct: 0 },
      { q: "Which Avenger can shrink to tiny size?", a: ["Ant-Man", "Hulk", "Falcon", "Vision"], correct: 0 },
      { q: "What is the name of Tony Stark's AI assistant in the early movies?", a: ["JARVIS", "FRIDAY", "ULTRON", "VISION"], correct: 0 },
      { q: "Who directed the first Avengers movie?", a: ["Joss Whedon", "James Gunn", "Taika Waititi", "Ryan Coogler"], correct: 0 },
      { q: "What does S.H.I.E.L.D. stand for?", a: ["Strategic Homeland Intervention, Enforcement and Logistics Division", "Super Hero Intelligence Enforcement League Division", "Strategic Heroes In Extreme Life Defense", "Secret Homeland Intelligence Enforcement League"], correct: 0 },
      { q: "How many Infinity Stones are there?", a: ["6", "5", "7", "4"], correct: 0 },
      { q: "What color is the Power Stone?", a: ["Purple", "Blue", "Red", "Orange"], correct: 0 },
      { q: "Who is the God of Mischief?", a: ["Loki", "Thor", "Odin", "Heimdall"], correct: 0 },
      { q: "What is the name of Doctor Strange's cloak?", a: ["Cloak of Levitation", "Crimson Bands of Cyttorak", "Eye of Agamotto Cape", "Sorcerer Supreme Robe"], correct: 0 },
      { q: "In which movie did Black Panther first appear?", a: ["Captain America: Civil War", "Black Panther", "Avengers: Infinity War", "Avengers: Age of Ultron"], correct: 0 },
      { q: "What is the real name of the Scarlet Witch?", a: ["Wanda Maximoff", "Agatha Harkness", "Monica Rambeau", "Darcy Lewis"], correct: 0 },
      { q: "Who played the Hulk in the 2008 Incredible Hulk movie?", a: ["Edward Norton", "Mark Ruffalo", "Eric Bana", "Lou Ferrigno (voice)"], correct: 0 },
      { q: "What is Star-Lord's real name?", a: ["Peter Quill", "Peter Parker", "Scott Lang", "Tony Stark"], correct: 0 },
      { q: "Who says 'Avengers... assemble!' in Endgame?", a: ["Captain America", "Iron Man", "Thor", "Black Panther"], correct: 0 },
      { q: "What is the name of Wakanda's king in the MCU?", a: ["T'Challa", "M'Baku", "Killmonger", "Okoye"], correct: 0 },
      { q: "Which movie features the line 'I love you 3000'?", a: ["Avengers: Endgame", "Avengers: Infinity War", "Iron Man 3", "Spider-Man: Far From Home"], correct: 0 },
      { q: "What is the name of the main villain in Doctor Strange?", a: ["Kaecilius", "Dormammu", "Baron Mordo", "The Ancient One"], correct: 0 },
      { q: "Who is Gamora's adoptive father?", a: ["Thanos", "Ronan", "Ego", "Yondu"], correct: 0 },
      { q: "What weapon does Hawkeye primarily use?", a: ["Bow and Arrow", "Sniper Rifle", "Sword", "Shield"], correct: 0 },
      { q: "In which movie do the Guardians of the Galaxy first appear?", a: ["Guardians of the Galaxy", "Avengers: Infinity War", "Thor: Ragnarok", "Captain Marvel"], correct: 0 },
      { q: "What is the name of Tony Stark's daughter?", a: ["Morgan", "Pepper", "Harley", "Cassie"], correct: 0 },
      { q: "Who becomes the new Captain America in Falcon and the Winter Soldier?", a: ["Sam Wilson", "Bucky Barnes", "John Walker", "Isaiah Bradley"], correct: 0 },
      { q: "What is the first song played in Guardians of the Galaxy Vol. 1?", a: ["Come and Get Your Love", "Mr. Blue Sky", "Hooked on a Feeling", "I Want You Back"], correct: 0 },
      { q: "Which character can phase through walls?", a: ["Vision", "Ghost", "America Chavez", "Monica Rambeau"], correct: 1 },
      { q: "What is the name of the building where the Avengers first assemble?", a: ["Stark Tower", "Avengers Tower", "Triskelion", "Sanctum Sanctorum"], correct: 1 },
      { q: "Who kills Thanos with the sword in Endgame?", a: ["Thor", "Captain Marvel", "Scarlet Witch", "Iron Man"], correct: 2 },
      { q: "What planet does Thor go to in Ragnarok?", a: ["Sakaar", "Asgard", "Nidavellir", "Xandar"], correct: 0 },
      { q: "What is the name of the AI that becomes Ultron?", a: ["Ultron", "Vision", "JARVIS", "FRIDAY"], correct: 0 },
      { q: "Who is the sorcerer supreme before Doctor Strange?", a: ["The Ancient One", "Wong", "Mordo", "Kaecilius"], correct: 0 },
      { q: "What does Loki transform into in the first Thor movie to escape?", a: ["A snake", "A bird", "A guard", "Captain America"], correct: 0 },
      { q: "Which Infinity Stone gives reality warping powers?", a: ["Reality Stone (Aether)", "Mind Stone", "Time Stone", "Power Stone"], correct: 0 },
      { q: "What is the name of the airport battle in Civil War?", a: ["Leipzig-Halle Airport", "JFK Airport", "LAX Airport", "Heathrow Airport"], correct: 0 },
      { q: "Who plays Loki in the MCU?", a: ["Tom Hiddleston", "Chris Hemsworth", "Idris Elba", "Anthony Hopkins"], correct: 0 },
      { q: "What is the name of the metal in Black Panther's suit?", a: ["Vibranium", "Adamantium", "Uru", "Carbonadium"], correct: 0 },
      { q: "Which movie introduced the character Shang-Chi?", a: ["Shang-Chi and the Legend of the Ten Rings", "Eternals", "Doctor Strange 2", "Spider-Man: No Way Home"], correct: 0 },
      { q: "What is the name of Vision's wife?", a: ["Wanda Maximoff", "Agatha Harkness", "Monica Rambeau", "Darcy Lewis"], correct: 0 },
      { q: "Who says 'I'm always angry'?", a: ["Bruce Banner", "Tony Stark", "Thor", "Steve Rogers"], correct: 0 },
      { q: "What is the name of the ship used by the Guardians?", a: ["Milano", "Benatar", "Knowhere", "Sanctuary II"], correct: 0 },
      { q: "In which movie does Captain Marvel first appear?", a: ["Captain Marvel", "Avengers: Endgame", "Avengers: Infinity War", "Thor: Ragnarok"], correct: 0 },
      { q: "What is the name of the villain in Black Panther?", a: ["Killmonger", "Klau", "M'Baku", "T'Challa"], correct: 0 },
      { q: "Who is the leader of the Dora Milaje?", a: ["Okoye", "Ayo", "Shuri", "Nakia"], correct: 0 },
      { q: "What year does Avengers: Endgame take place mainly in?", a: ["2023", "2018", "2025", "2012"], correct: 0 },
      { q: "What is the name of Peter Quill's father?", a: ["Ego", "Yondu", "Ronan", "Thanos"], correct: 0 },
      { q: "Which character has the Time Stone?", a: ["Doctor Strange", "Wong", "Ancient One", "Dormammu"], correct: 0 },
      { q: "What is the name of the compound where the Avengers live in Age of Ultron?", a: ["Avengers Compound", "Stark Tower", "Triskelion", "Wakanda"], correct: 0 },
      { q: "Who plays Nebula?", a: ["Karen Gillan", "Pom Klementieff", "Zoe Saldana", "Elizabeth Olsen"], correct: 0 },
      { q: "What is the name of the event where half the universe disappears?", a: ["The Blip", "The Snap", "The Decimation", "All of the above"], correct: 3 },
      { q: "Which actor played both Iron Man and voiced Ultron?", a: ["Robert Downey Jr.", "James Spader", "Chris Evans", "Mark Ruffalo"], correct: 0 },
      { q: "What is the name of Scott Lang's daughter?", a: ["Cassie", "Morgan", "Harley", "Pepper"], correct: 0 },
      { q: "In which movie does Thor lose his eye?", a: ["Thor: Ragnarok", "Avengers: Infinity War", "Thor: The Dark World", "Avengers: Endgame"], correct: 0 },
      { q: "What is the name of the dragon-like creature in Shang-Chi?", a: ["The Great Protector", "Fin Fang Foom", "Dormammu", "Surtur"], correct: 0 }
    ];

    let currentQuestions = [];
    let currentIndex = 0;
    let score = 0;
    let isPlaying = false;
    const audio = document.getElementById("bgmusic");
    const musicBtn = document.getElementById("music-btn");

    function toggleMusic() {
      if (isPlaying) {
        audio.pause();
        musicBtn.textContent = "🎵 Play Epic Music";
      } else {
        audio.play().then(() => musicBtn.textContent = "⏸ Pause Music")
                   .catch(() => musicBtn.textContent = "🎵 Tap again");
      }
      isPlaying = !isPlaying;
    }

    function shuffle(array) {
      return array.sort(() => Math.random() - 0.5);
    }

    function startQuiz() {
      currentQuestions = shuffle([...questionsDB]).slice(0, 3);
      currentIndex = 0;
      score = 0;
      document.getElementById("result").style.display = "none";
      document.getElementById("quiz").style.display = "block";
      document.getElementById("next-btn").style.display = "none";
      showQuestion();
    }

    function showQuestion() {
      const q = currentQuestions[currentIndex];
      document.getElementById("q-num").textContent = currentIndex + 1;
      document.getElementById("question-text").textContent = q.q;
      
      const optionsDiv = document.getElementById("options");
      optionsDiv.innerHTML = "";
      
      q.a.forEach((answer, i) => {
        const btn = document.createElement("button");
        btn.textContent = answer;
        btn.className = "answer-btn";
        btn.onclick = () => checkAnswer(i, q.correct);
        optionsDiv.appendChild(btn);
      });
    }

    function checkAnswer(selected, correct) {
      if (selected === correct) score++;
      
      const buttons = document.querySelectorAll(".answer-btn");
      buttons.forEach((b, i) => {
        b.disabled = true;
        if (i === correct) b.classList.add("correct");
      });
      
      document.getElementById("next-btn").style.display = "inline-block";
      if (currentIndex === 2) document.getElementById("next-btn").textContent = "See Your Score!";
    }

    function nextQuestion() {
      currentIndex++;
      if (currentIndex < 3) {
        showQuestion();
        document.getElementById("next-btn").style.display = "none";
        document.getElementById("next-btn").textContent = "Next Question";
      } else {
        endQuiz();
      }
    }

    function endQuiz() {
      document.getElementById("quiz").style.display = "none";
      const resultDiv = document.getElementById("result");
      resultDiv.style.display = "block";
      
      let message = score === 3 ? "🦸‍♂️ Perfect score! You're a true MCU Master!" :
                    score === 2 ? "👍 Great job! Almost a perfect run!" :
                    score === 1 ? "🍿 Not bad — time for a rewatch marathon!" :
                    "Time to binge the entire saga again!";

      resultDiv.innerHTML = `
        <h2>Quiz Complete!</h2>
        <p>Your score: <strong>${score}/3</strong></p>
        <p>${message}</p>
        <button onclick="startQuiz()" style="background:#00bfff; padding:18px 45px; font-size:1.35em;">Play Again</button>
      `;
    }

    window.onload = startQuiz;
  </script>
</body>
</html>
