<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MCU Quiz Challenge</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700&family=Barlow:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --red: #e62429;
    --red-glow: rgba(230, 36, 41, 0.6);
    --gold: #f0b429;
    --dark: #0a0a0f;
    --card: rgba(10,10,20,0.85);
    --correct: #00e676;
    --wrong: #ff1744;
  }

- { box-sizing: border-box; margin: 0; padding: 0; }

body {
font-family: ‘Barlow’, sans-serif;
min-height: 100vh;
background: var(–dark);
color: #fff;
display: flex;
align-items: center;
justify-content: center;
overflow-x: hidden;
position: relative;
}

.bg {
position: fixed;
inset: 0;
background:
radial-gradient(ellipse 80% 60% at 20% 10%, rgba(230,36,41,0.18) 0%, transparent 60%),
radial-gradient(ellipse 60% 80% at 80% 90%, rgba(0,100,200,0.12) 0%, transparent 60%),
radial-gradient(ellipse 100% 100% at 50% 50%, #0a0a1a 0%, #000 100%);
z-index: 0;
}

.bg::after {
content: ‘’;
position: fixed;
inset: 0;
background-image:
repeating-linear-gradient(60deg, rgba(230,36,41,0.03) 0px, transparent 1px, transparent 60px),
repeating-linear-gradient(-60deg, rgba(230,36,41,0.03) 0px, transparent 1px, transparent 60px),
repeating-linear-gradient(0deg, rgba(255,255,255,0.02) 0px, transparent 1px, transparent 60px);
z-index: 0;
}

.container {
position: relative;
z-index: 1;
width: 100%;
max-width: 680px;
margin: 20px auto;
padding: 0 16px;
}

.screen {
background: var(–card);
border: 1px solid rgba(230,36,41,0.3);
border-radius: 4px;
padding: 40px 36px;
box-shadow: 0 0 60px rgba(230,36,41,0.2), 0 0 120px rgba(0,0,0,0.8), inset 0 1px 0 rgba(255,255,255,0.05);
backdrop-filter: blur(20px);
animation: fadeIn 0.4s ease;
}

@keyframes fadeIn {
from { opacity: 0; transform: translateY(12px); }
to { opacity: 1; transform: translateY(0); }
}

.logo-wrap { text-align: center; margin-bottom: 28px; }

.logo-badge {
display: inline-block;
background: var(–red);
color: white;
font-family: ‘Bebas Neue’, ‘Arial Narrow’, Arial, sans-serif;
font-size: 0.9em;
letter-spacing: 4px;
padding: 4px 14px;
margin-bottom: 8px;
clip-path: polygon(8px 0%, 100% 0%, calc(100% - 8px) 100%, 0% 100%);
}

h1 {
font-family: ‘Bebas Neue’, ‘Arial Narrow’, Arial, sans-serif;
font-size: 3.8em;
letter-spacing: 4px;
line-height: 0.9;
color: #fff;
text-shadow: 0 0 40px var(–red-glow), 0 0 80px rgba(230,36,41,0.3);
}

h1 span { color: var(–red); }

.tagline {
font-family: ‘Barlow Condensed’, sans-serif;
font-size: 1em;
letter-spacing: 3px;
text-transform: uppercase;
color: rgba(255,255,255,0.4);
margin-top: 6px;
}

.mode-label {
font-family: ‘Barlow Condensed’, sans-serif;
font-size: 0.8em;
letter-spacing: 3px;
text-transform: uppercase;
color: rgba(255,255,255,0.4);
margin: 28px 0 12px;
}

.mode-grid {
display: grid;
grid-template-columns: repeat(3, 1fr);
gap: 10px;
margin-bottom: 28px;
}

.mode-btn {
background: rgba(255,255,255,0.04);
border: 1px solid rgba(255,255,255,0.1);
border-radius: 4px;
padding: 14px 8px;
cursor: pointer;
color: #fff;
text-align: center;
transition: all 0.2s;
font-family: ‘Barlow Condensed’, sans-serif;
}

.mode-btn .num {
font-family: ‘Bebas Neue’, ‘Arial Narrow’, Arial, sans-serif;
font-size: 2.2em;
line-height: 1;
color: rgba(255,255,255,0.5);
display: block;
transition: color 0.2s;
}

.mode-btn .lbl {
font-size: 0.75em;
letter-spacing: 2px;
text-transform: uppercase;
color: rgba(255,255,255,0.3);
display: block;
margin-top: 2px;
}

.mode-btn:hover, .mode-btn.active {
border-color: var(–red);
background: rgba(230,36,41,0.12);
box-shadow: 0 0 20px rgba(230,36,41,0.2);
}

.mode-btn.active .num { color: var(–red); }
.mode-btn.active .lbl { color: rgba(255,255,255,0.6); }

.btn-primary {
width: 100%;
background: var(–red);
color: white;
border: none;
padding: 18px;
font-family: ‘Bebas Neue’, ‘Arial Narrow’, Arial, sans-serif;
font-size: 1.5em;
letter-spacing: 3px;
cursor: pointer;
border-radius: 3px;
transition: all 0.2s;
position: relative;
overflow: hidden;
}

.btn-primary::after {
content: ‘’;
position: absolute;
inset: 0;
background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
transform: translateX(-100%);
transition: transform 0.4s;
}

.btn-primary:hover { background: #ff2d33; box-shadow: 0 0 30px var(–red-glow); }
.btn-primary:hover::after { transform: translateX(100%); }

/* Music row */
.music-row {
display: flex;
align-items: center;
gap: 10px;
margin-bottom: 20px;
}

.music-toggle {
background: rgba(255,255,255,0.06);
border: 1px solid rgba(255,255,255,0.12);
color: rgba(255,255,255,0.5);
border-radius: 3px;
padding: 8px 16px;
font-family: ‘Barlow Condensed’, sans-serif;
font-size: 0.8em;
letter-spacing: 2px;
text-transform: uppercase;
cursor: pointer;
transition: all 0.2s;
}

.music-toggle:hover, .music-toggle.on {
border-color: var(–gold);
color: var(–gold);
background: rgba(240,180,41,0.08);
}

/* Quiz screen */
.progress-bar-wrap { margin-bottom: 24px; }

.progress-meta {
display: flex;
justify-content: space-between;
align-items: center;
margin-bottom: 8px;
}

.q-counter {
font-family: ‘Barlow Condensed’, sans-serif;
font-size: 0.8em;
letter-spacing: 3px;
text-transform: uppercase;
color: rgba(255,255,255,0.4);
}

.score-display {
font-family: ‘Bebas Neue’, ‘Arial Narrow’, Arial, sans-serif;
font-size: 1.3em;
color: var(–gold);
letter-spacing: 2px;
}

.progress-bar {
height: 3px;
background: rgba(255,255,255,0.08);
border-radius: 2px;
overflow: hidden;
}

.progress-fill {
height: 100%;
background: linear-gradient(90deg, var(–red), #ff6b6b);
border-radius: 2px;
transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
box-shadow: 0 0 8px var(–red-glow);
}

.timer-wrap {
display: flex;
align-items: center;
gap: 10px;
margin-bottom: 20px;
}

.timer-bar {
flex: 1;
height: 6px;
background: rgba(255,255,255,0.08);
border-radius: 3px;
overflow: hidden;
}

.timer-fill {
height: 100%;
background: var(–gold);
border-radius: 3px;
transition: width 1s linear, background 0.5s;
box-shadow: 0 0 8px rgba(240,180,41,0.5);
}

.timer-fill.urgent { background: var(–red); box-shadow: 0 0 8px var(–red-glow); }

.timer-num {
font-family: ‘Bebas Neue’, ‘Arial Narrow’, Arial, sans-serif;
font-size: 1.4em;
color: var(–gold);
width: 30px;
text-align: right;
transition: color 0.3s;
}

.timer-num.urgent { color: var(–red); }

.question-text {
font-family: ‘Barlow Condensed’, sans-serif;
font-size: 1.6em;
font-weight: 600;
line-height: 1.3;
min-height: 80px;
margin-bottom: 28px;
color: #fff;
}

.options {
display: grid;
grid-template-columns: 1fr 1fr;
gap: 10px;
margin-bottom: 20px;
}

.answer-btn {
background: rgba(255,255,255,0.05);
border: 1px solid rgba(255,255,255,0.12);
color: #fff;
padding: 16px 14px;
font-family: ‘Barlow Condensed’, sans-serif;
font-size: 1.05em;
font-weight: 600;
cursor: pointer;
border-radius: 4px;
text-align: left;
transition: all 0.18s;
line-height: 1.3;
}

.answer-btn:hover:not(:disabled) {
border-color: rgba(255,255,255,0.35);
background: rgba(255,255,255,0.1);
transform: translateY(-1px);
}

.answer-btn:disabled { cursor: default; }

.answer-btn.correct {
background: rgba(0,230,118,0.15) !important;
border-color: var(–correct) !important;
color: var(–correct) !important;
box-shadow: 0 0 20px rgba(0,230,118,0.2);
transform: none;
}

.answer-btn.wrong {
background: rgba(255,23,68,0.15) !important;
border-color: var(–wrong) !important;
color: var(–wrong) !important;
}

.answer-btn.dimmed { opacity: 0.35; }

.next-wrap { text-align: right; min-height: 50px; }

.btn-next {
background: transparent;
border: 1px solid rgba(255,255,255,0.2);
color: rgba(255,255,255,0.7);
padding: 12px 28px;
font-family: ‘Barlow Condensed’, sans-serif;
font-size: 0.9em;
letter-spacing: 3px;
text-transform: uppercase;
cursor: pointer;
border-radius: 3px;
transition: all 0.2s;
display: none;
}

.btn-next.visible { display: inline-block; }
.btn-next:hover { border-color: var(–red); color: var(–red); background: rgba(230,36,41,0.08); }

/* Result screen */
.result-shield { text-align: center; margin-bottom: 28px; }

.result-score {
font-family: ‘Bebas Neue’, ‘Arial Narrow’, Arial, sans-serif;
font-size: 7em;
line-height: 1;
color: var(–red);
text-shadow: 0 0 40px var(–red-glow);
display: block;
}

.result-total {
font-family: ‘Barlow Condensed’, sans-serif;
font-size: 1em;
letter-spacing: 4px;
text-transform: uppercase;
color: rgba(255,255,255,0.35);
}

.result-title {
font-family: ‘Bebas Neue’, ‘Arial Narrow’, Arial, sans-serif;
font-size: 2.2em;
letter-spacing: 2px;
margin: 12px 0 6px;
}

.result-msg {
color: rgba(255,255,255,0.6);
font-size: 1em;
line-height: 1.5;
margin-bottom: 24px;
}

.result-breakdown {
border-top: 1px solid rgba(255,255,255,0.08);
padding-top: 20px;
margin-bottom: 24px;
}

.breakdown-row {
display: flex;
justify-content: space-between;
align-items: center;
padding: 8px 0;
border-bottom: 1px solid rgba(255,255,255,0.04);
font-size: 0.9em;
gap: 12px;
}

.breakdown-q {
color: rgba(255,255,255,0.6);
flex: 1;
font-family: ‘Barlow Condensed’, sans-serif;
font-size: 1em;
}

.breakdown-icon { font-size: 1.1em; flex-shrink: 0; }

.result-actions {
display: grid;
grid-template-columns: 1fr 1fr;
gap: 10px;
}

.btn-secondary {
background: transparent;
border: 1px solid rgba(255,255,255,0.15);
color: rgba(255,255,255,0.6);
padding: 14px;
font-family: ‘Barlow Condensed’, sans-serif;
font-size: 0.85em;
letter-spacing: 2px;
text-transform: uppercase;
cursor: pointer;
border-radius: 3px;
transition: all 0.2s;
}

.btn-secondary:hover { border-color: rgba(255,255,255,0.4); color: #fff; }

.feedback-flash {
position: fixed;
inset: 0;
pointer-events: none;
z-index: 999;
opacity: 0;
transition: opacity 0.15s;
}

.feedback-flash.correct-flash { background: rgba(0,230,118,0.08); }
.feedback-flash.wrong-flash { background: rgba(255,23,68,0.1); }
.feedback-flash.show { opacity: 1; }

@media (max-width: 500px) {
.screen { padding: 28px 20px; }
h1 { font-size: 2.8em; }
.options { grid-template-columns: 1fr; }
.result-actions { grid-template-columns: 1fr; }
}
</style>

</head>

  { q: "Which character time-traveled using a Quantum Tunnel hidden in a van?", a: ["Scott Lang / Ant-Man", "Tony Stark", "Bruce Banner", "Steve Rogers"], correct: 0 },
  { q: "Who kills Thanos in the opening of Endgame?", a: ["Thor", "Iron Man", "Captain Marvel", "Scarlet Witch"], correct: 0 },
  { q: "What is the name of Tony Stark's AI in later films after JARVIS?", a: ["FRIDAY", "ULTRON", "VISION", "EDITH"], correct: 0 },
];
/* ============================================================
   END OF QUESTIONS DATABASE
   ============================================================ */


/* ============================================================
   GAME LOGIC — edit below only if changing how the game works
   ============================================================ */
let selectedCount = 3;
let currentQuestions = [];
let currentIndex = 0;
let score = 0;
let answered = [];
let isPlaying = false;
let timerInterval = null;
let timeLeft = 15;
const TIMER_SECONDS = 15;

const audio = document.getElementById("bgmusic");

function selectMode(el, count) {
  document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  selectedCount = count;
}

function toggleMusic() {
  const btn = document.getElementById('musicBtn');
  if (isPlaying) {
    audio.pause();
    btn.textContent = '🎵 Epic Music: OFF';
    btn.classList.remove('on');
  } else {
    audio.play().catch(() => {
      btn.textContent = '🎵 Music unavailable';
    });
    btn.textContent = '⏸ Epic Music: ON';
    btn.classList.add('on');
  }
  isPlaying = !isPlaying;
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function startQuiz() {
  // Pick random questions, then shuffle each question's answers
  // Correct answer is tracked by TEXT so shuffle can't break it
  currentQuestions = shuffle(questionsDB).slice(0, selectedCount).map(q => {
    const correctText = q.a[q.correct];
    const shuffledAnswers = shuffle(q.a);
    return {
      q: q.q,
      a: shuffledAnswers,
      correct: shuffledAnswers.indexOf(correctText)
    };
  });

  currentIndex = 0;
  score = 0;
  answered = [];

  document.getElementById('startScreen').style.display = 'none';
  document.getElementById('resultScreen').style.display = 'none';
  document.getElementById('quizScreen').style.display = 'block';
  document.getElementById('qTotal').textContent = selectedCount;

  showQuestion();
}

function showQuestion() {
  const q = currentQuestions[currentIndex];
  document.getElementById('qNum').textContent = currentIndex + 1;
  document.getElementById('scoreLive').textContent = score;
  document.getElementById('questionText').textContent = q.q;

  const pct = (currentIndex / selectedCount) * 100;
  document.getElementById('progressFill').style.width = pct + '%';

  const opts = document.getElementById('options');
  opts.innerHTML = '';
  q.a.forEach((ans, i) => {
    const btn = document.createElement('button');
    btn.className = 'answer-btn';
    btn.textContent = ans;
    btn.onclick = () => checkAnswer(i);
    opts.appendChild(btn);
  });

  document.getElementById('nextBtn').classList.remove('visible');
  startTimer();
}

function startTimer() {
  clearInterval(timerInterval);
  timeLeft = TIMER_SECONDS;
  updateTimerUI();
  timerInterval = setInterval(() => {
    timeLeft--;
    updateTimerUI();
    if (timeLeft <= 0) {
      clearInterval(timerInterval);
      timeUp();
    }
  }, 1000);
}

function updateTimerUI() {
  const fill = document.getElementById('timerFill');
  const num = document.getElementById('timerNum');
  fill.style.width = (timeLeft / TIMER_SECONDS * 100) + '%';
  num.textContent = timeLeft;
  const urgent = timeLeft <= 5;
  fill.classList.toggle('urgent', urgent);
  num.classList.toggle('urgent', urgent);
}

function timeUp() {
  disableAllAnswers();
  answered.push({ q: currentQuestions[currentIndex].q, correct: false, timedOut: true });
  flashFeedback(false);
  showNext();
}

function checkAnswer(selectedIndex) {
  clearInterval(timerInterval);
  const q = currentQuestions[currentIndex];
  const isCorrect = selectedIndex === q.correct;
  if (isCorrect) score++;

  document.querySelectorAll('.answer-btn').forEach((btn, i) => {
    btn.disabled = true;
    if (i === q.correct) btn.classList.add('correct');
    else if (i === selectedIndex && !isCorrect) btn.classList.add('wrong');
    else btn.classList.add('dimmed');
  });

  answered.push({ q: q.q, correct: isCorrect });
  flashFeedback(isCorrect);
  showNext();
}

function disableAllAnswers() {
  const q = currentQuestions[currentIndex];
  document.querySelectorAll('.answer-btn').forEach((btn, i) => {
    btn.disabled = true;
    if (i === q.correct) btn.classList.add('correct');
    else btn.classList.add('dimmed');
  });
}

function flashFeedback(isCorrect) {
  const el = document.getElementById('feedbackFlash');
  el.className = 'feedback-flash ' + (isCorrect ? 'correct-flash' : 'wrong-flash') + ' show';
  setTimeout(() => el.classList.remove('show'), 300);
}

function showNext() {
  const btn = document.getElementById('nextBtn');
  btn.textContent = currentIndex === selectedCount - 1 ? 'See Results →' : 'Next →';
  btn.classList.add('visible');
}

function nextQuestion() {
  currentIndex++;
  if (currentIndex < selectedCount) {
    showQuestion();
  } else {
    endQuiz();
  }
}

function endQuiz() {
  clearInterval(timerInterval);
  document.getElementById('quizScreen').style.display = 'none';
  document.getElementById('resultScreen').style.display = 'block';

  const pct = score / selectedCount;
  const resultData = pct === 1
    ? { title: "🦸 MCU MASTER", msg: "Perfect score! Fury would put you on the Avengers Initiative." }
    : pct >= 0.7
    ? { title: "⚡ WORTHY HERO", msg: "Strong showing. You clearly spend quality time in the MCU." }
    : pct >= 0.4
    ? { title: "🍿 CASUAL FAN", msg: "Not bad — time for a rewatch marathon before your next attempt." }
    : { title: "💀 THANOS WINS", msg: "The snap got you. Binge the entire saga and come back stronger." };

  document.getElementById('resultScore').textContent = score;
  document.getElementById('resultTotal').textContent = `out of ${selectedCount} correct`;
  document.getElementById('resultTitle').textContent = resultData.title;
  document.getElementById('resultMsg').textContent = resultData.msg;

  document.getElementById('breakdown').innerHTML = answered.map(a => `
    <div class="breakdown-row">
      <span class="breakdown-q">${a.q}</span>
      <span class="breakdown-icon">${a.correct ? '✅' : (a.timedOut ? '⏱' : '❌')}</span>
    </div>
  `).join('');
}

function goHome() {
  clearInterval(timerInterval);
  document.getElementById('resultScreen').style.display = 'none';
  document.getElementById('quizScreen').style.display = 'none';
  document.getElementById('startScreen').style.display = 'block';
}

</script>
